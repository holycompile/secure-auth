<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>📝 Create Account</h2>

    {% if success %}
    <p class="success">{{ success }}</p>
    {% endif %}

    <form method="POST">
        <input type="text" name="username" placeholder="Choose Username" required><br>
        <input type="password" name="password" placeholder="Choose Password" required><br>
        <button type="submit">Register</button>
    </form>

    <p>Already have an account? <a href="/login" style="color:lightblue;">Login</a></p>
</div>

</body>
</html>
