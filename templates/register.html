<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Cypher Security</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="/" class="navbar-brand">🔐 Cypher</a>
    <div class="navbar-links">
        <a href="/">Home</a>
        <a href="/login">Login</a>
    </div>
</div>

<div class="container">
    <h2>📝 Create Account</h2>

    {% if error %}
    <div class="error">
        <span>{{ error }}</span>
    </div>
    {% endif %}

    {% if success %}
    <div class="success">
        <span>{{ success }}</span>
    </div>
    {% endif %}

    <form method="POST">
        <div class="form-group">
            <label for="username">Choose Username</label>
            <input type="text" id="username" name="username" placeholder="Enter new username" required autocomplete="username">
        </div>
        <div class="form-group">
            <label for="password">Choose Password</label>
            <input type="password" id="password" name="password" placeholder="Enter strong password" required autocomplete="new-password">
        </div>
        <button type="submit">Register</button>
    </form>

    <p style="margin-top: 1.5rem; font-size: 0.95rem; color: var(--text-muted);">
        Already have an account? <a href="/login">Login here</a>
    </p>
</div>

</body>
</html>
